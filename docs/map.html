<!DOCTYPE html>
<html lang="en"><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Fuel prices</title>

    <link rel="stylesheet" href="leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
    <script src="leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <style>
        html, body {
            height: 100%;
            margin: 0;
        }
        .leaflet-container {
            height: 100%;
            width: 100%;
            max-width: 100%;
            max-height: 100%;
        }

        .info {
            background: white;
            border-radius: 5px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
            color: #555;
            font: 14px/16px Arial, Helvetica, sans-serif;
            line-height: 18px;
            padding: 6px 8px;
        }

        .options p {
            margin: 0px;
        }

        .options input {
            height: 1.3em;
            width: 1.3em;
        }

        .leaflet-popup-content h4 {
            margin: 0 0 5px;
        }
        .leaflet-popup-content a {
            display: block;
            margin-top: 6px;
            width: 100%;
        }
        .leaflet-popup-content img {
            width: 32px;
        }

        .legend svg {
            height: 32px;
            margin-right: 2px;
            vertical-align: middle;
            width: 32px;
        }
    </style>
</head>
<body class="">

<div id="map"></div>

<script type="module">
    const fuels = [
        {"label": "Petrol", "name": "E10"},
        {"label": "Diesel", "name": "B7_STANDARD"},
        {"label": "Super", "name": "E5"},
        {"label": "Diesel+", "name": "B7_PREMIUM"}
    ];

    const colormap_response = await fetch("colormaps/plasma.json");
    const colormap_data = await colormap_response.json();

    function colormap(price_fraction) {
        const i = Math.round(255 * price_fraction);
        const rgb = colormap_data[i];
        const Rh = ("0" + Math.round(rgb[0] * 255).toString(16)).slice(-2);
        const Gh = ("0" + Math.round(rgb[1] * 255).toString(16)).slice(-2);
        const Bh = ("0" + Math.round(rgb[2] * 255).toString(16)).slice(-2);
        return `#${Rh}${Gh}${Bh}`;
    }

    function priceStyle(priceFraction, ageDays) {
        const clampedAge = Math.min(Math.max(ageDays - 2, 0), 7);
        const ageFraction = (7.0 - clampedAge) / 7;
        return {
            fillColor: colormap(priceFraction),
            fillOpacity: 0.2 + 0.8 * ageFraction,
            opacity: 0.2 + 0.8 * ageFraction,
            radius: 8 + 6 * priceFraction
        };
    }

    const zoom = 10;
    const map = L.map('map');
    // Default to centre of station data...
    map.setView([54.67, -3.62], 6);
    // ...but try to show the relevant region.
    map.locate({setView: true, maxZoom: 10});

    L.Control.FuelType = L.Control.extend({
        fuel: "E10",
        _inputs: [],

        onAdd: function(map) {
            var div = L.DomUtil.create('div', 'info options');
            fuels.forEach(fuel => {
                var p = L.DomUtil.create('p');
                var input = L.DomUtil.create('input');
                input.type = 'radio';
                input.name = 'fuel';
                input.id = fuel.name;
                if (fuel.name == this.fuel) {
                    input.checked = true;
                }
                p.append(input);
                var label = L.DomUtil.create('label');
                label.for = fuel.name;
                label.innerHTML = fuel.label;
                p.append(label);
                div.append(p);

                this._inputs.push(input);
                L.DomEvent.on(input, 'click', event => {
                    this.fuel = event.target.id;
                    restyle();
                    L.DomEvent.stopPropagation(event);
                });
            });
            return div;
        },

        onRemove: function(map) {
            this._inputs.forEach(input => {
                L.DomEvent.off(input, 'click');
            });
            this._inputs = [];
        }
    });

    L.control.fuelType = function(opts) {
        return new L.Control.FuelType(opts);
    }

    var fuelType = L.control.fuelType({position: 'topright'}).addTo(map);

    function legendItem(style, label) {
        return `<svg>
  <g>
    <path stroke="#555" stroke-opacity="1" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" fill="${style.fillColor}" fill-opacity="${style.fillOpacity}" fill-rule="evenodd" d="M${15-style.radius},16a${style.radius},${style.radius} 0 1,0 ${style.radius*2},0 a${style.radius},${style.radius} 0 1,0 -${style.radius*2},0 "></path>
  </g>
</svg>${label}`
    }

    var legend = L.control({position: 'bottomright'});
    legend.onAdd = function(map) {
        var div = L.DomUtil.create('div', 'info legend');
        div.innerHTML = legendItem(priceStyle(1, 0), 'Cheap') + '<br>'
            + legendItem(priceStyle(0.5, 0), '') + '<br>'
            + legendItem(priceStyle(0, 0), 'Pricey') + '<br>' + '<br>'
            + legendItem(priceStyle(0.33, 0), 'Fresh') + '<br>'
            + legendItem(priceStyle(0.33, 10), 'Stale');
        return div;
    }
    legend.addTo(map);
    legend.addTo(map);

    const tiles = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a> | &copy; <a href="https://matplotlib.org/stable/project/license.html">Matplotlib</a>'
    }).addTo(map);

    const url = "https://rhattersley.github.io/fuel-data/all.json";
    const response = await fetch(url);
    const stations = await response.json();

    var min, max;

    function setRange() {
        var prices = stations
            .filter(station => {
                const fuel = fuelType.fuel;
                return fuel in station.prices && station.prices[fuel]['price'] > 0;
            })
            .map(station => {return station.prices[fuelType.fuel]['price']})
            .sort((a, b) => a - b);
        prices = prices.slice(prices.length * 0.05, prices.length * 0.95);
        min = prices.reduce((a, b) => {return Math.min(a, b)});
        max = prices.reduce((a, b) => {return Math.max(a, b)});
    }

    const now = Date.now()

    function stationAnalyse(station) {
        const fuelName = fuelType.fuel;
        if (fuelName in station.prices) {
            const fuel = station.prices[fuelName];
            const price = fuel['price'];
            if (price == 0) {
                console.log('Zero price!');
                return {}
            }
            const priceFraction = 1 - Math.min(Math.max((price-min)/(max-min), 0), 1);
            const ageMillis = now - Date.parse(fuel['price_last_updated']);
            const ageDays = ageMillis / 1000 / 86400;
            return {
                'priceFraction': priceFraction,
                'ageDays': ageDays,
            }
        } else {
            return {}
        }
    }

    function stationStyle(stationInfo) {
        if ('priceFraction' in stationInfo) {
            return priceStyle(stationInfo.priceFraction, stationInfo.ageDays);
        } else {
            return {fillOpacity: 0, opacity: 0};
            return {fillColor: '#888', fillOpacity: 0.2, opacity: 0.2};
        }
    }

    function displayPrices(stations) {
        const basicStyle = {
            color: '#000',
            weight: 1,
            opacity: 0,
            fillOpacity: 0,
        };
        stations.forEach(station => {
            const stationInfo = stationAnalyse(station);
            const marker = L.circleMarker(
                [station.location.latitude, station.location.longitude],
                basicStyle
            );
            station.marker = marker;
            marker.addTo(map);
            var rows = fuels.map(fuel => {
                var price = fuel.name in station.prices ? station.prices[fuel.name]['price'] : 0;
                if (!(price > 0)) {
                    price = 'N/A';
                }
                return `${fuel.label}: ${price}`
            });
            marker.bindPopup(
                `<h4>${station.brand}</h4>`
                + rows.join('<br>')
                + `<br><a href="https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(station.brand + ", " + station.address + ", " + station.postcode)}" target="_blank"><img src="car.png"></a>`
            );
        });
    }

    function restyle() {
        setRange();
        stations.forEach(station => {
            const marker = station.marker;
            const stationInfo = stationAnalyse(station);
            marker.setStyle(stationStyle(stationInfo));
            marker._path.sortValue = stationInfo.priceFraction || -1;
        });
        const pathParent = stations[0].marker._path.parentNode;
        [...pathParent.childNodes]
            .sort((a, b) => a.sortValue - b.sortValue)
            .forEach(path => pathParent.appendChild(path));
    }

    displayPrices(stations);
    restyle();
</script>

</body></html>
